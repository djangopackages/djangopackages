# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

formats: all

build:
  os: ubuntu-24.04
  tools:
    python: "3.14"
  commands:
    - uv sync --group docs
    - uv run mkdocs build --clean --site-dir $READTHEDOCS_OUTPUT/html --config-file docs/mkdocs.yml
